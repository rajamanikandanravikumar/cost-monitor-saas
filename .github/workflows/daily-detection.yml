name: Daily Anomaly Detection

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  trigger-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Call detection endpoint
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://cost-monitor-saas.onrender.com/internal/run-detection/?token=${{ secrets.CRON_SECRET_TOKEN }}")
          echo "Full response:"
          echo "$response"
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "Request failed with status $status"
            exit 1
          fi
          echo "Success — status 200"
